<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity Bank - Eventos</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 420px;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #4b0082;
    }

    .campo {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    select,
    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #4b0082;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #36005f;
    }

    #resultado {
      margin-top: 25px;
      background: #f9fafb;
      padding: 18px;
      border-radius: 8px;
      line-height: 1.9;
      border: 1px solid #eee;
    }

    .titulo {
      color: #4b0082;
      font-weight: bold;
    }

    .desconto {
      color: green;
      font-weight: bold;
    }

    .total {
      color: #111827;
      font-size: 18px;
      font-weight: bold;
    }

  </style>
</head>
<body>

  <div class="card">

    <h1>Crédito para Eventos</h1>

    <div class="campo">
      <label>Escolha o Pacote</label>

      <select id="pacote">
        <option value="50">Standard - R$ 50,00</option>
        <option value="80">Premium - R$ 80,00</option>
        <option value="120">Infinity Deluxe - R$ 120,00</option>
      </select>
    </div>

    <div class="campo">
      <label>Quantidade de Pessoas</label>

      <input type="number" id="pessoas" min="1">
    </div>

    <button id="calcular">
      Calcular Orçamento
    </button>

    <div id="resultado"></div>

  </div>

  <script>

    const botao = document.getElementById("calcular");

    botao.addEventListener("click", () => {

      const valorPacote =
        Number(document.getElementById("pacote").value);

      const pessoas =
        Number(document.getElementById("pessoas").value);

      const resultado =
        document.getElementById("resultado");

      // Cálculo base
      const custoBruto = valorPacote * pessoas;

      // Taxa de serviço (10%)
      const taxaServico = custoBruto * 0.10;

      // Total com taxa
      const subtotal = custoBruto + taxaServico;

      let desconto = 0;

      // Desconto fidelidade
      if (pessoas > 100) {
        desconto = subtotal * 0.05;
      }

      // Total final
      const totalFinal = subtotal - desconto;

      resultado.innerHTML = `
        <p>
          <span class="titulo">Custo Bruto:</span>
          R$ ${custoBruto.toFixed(2)}
        </p>

        <p>
          <span class="titulo">Taxa de Serviço (10%):</span>
          R$ ${taxaServico.toFixed(2)}
        </p>

        <p>
          <span class="desconto">Desconto Aplicado:</span>
          R$ ${desconto.toFixed(2)}
        </p>

        <hr style="margin: 12px 0;">

        <p class="total">
          Total Final: R$ ${totalFinal.toFixed(2)}
        </p>
      `;
    });

  </script>

</body>
</html>
