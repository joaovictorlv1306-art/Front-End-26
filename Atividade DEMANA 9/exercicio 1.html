<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validador de CPF</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    #resultado {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .valido {
      color: green;
    }

    .invalido {
      color: red;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Validador de CPF</h1>

    <input type="text" id="cpf" placeholder="Digite o CPF">

    <button onclick="validarCPF()">Validar</button>

    <div id="resultado"></div>
  </div>

  <script>
    function validarCPF() {
      const cpfInput = document.getElementById("cpf").value;
      const resultado = document.getElementById("resultado");

      // Remove caracteres não numéricos
      const cpf = cpfInput.replace(/\D/g, "");

      // Verifica se tem 11 dígitos
      if (cpf.length !== 11) {
        mostrarResultado(false);
        return;
      }

      // Verifica se todos os números são iguais
      if (/^(\d)\1+$/.test(cpf)) {
        mostrarResultado(false);
        return;
      }

      // Função para calcular dígito verificador
      function calcularDigito(cpfParcial, pesoInicial) {
        let soma = 0;

        for (let i = 0; i < cpfParcial.length; i++) {
          soma += parseInt(cpfParcial[i]) * (pesoInicial - i);
        }

        let resto = (soma * 10) % 11;

        return resto === 10 ? 0 : resto;
      }

      // Calcula os dois dígitos
      const primeiroDigito = calcularDigito(cpf.substring(0, 9), 10);
      const segundoDigito = calcularDigito(cpf.substring(0, 10), 11);

      // Verifica se os dígitos batem
      if (
        primeiroDigito == cpf[9] &&
        segundoDigito == cpf[10]
      ) {
        mostrarResultado(true);
      } else {
        mostrarResultado(false);
      }

      function mostrarResultado(valido) {
        if (valido) {
          resultado.textContent = "CPF Válido ✅";
          resultado.className = "valido";
        } else {
          resultado.textContent = "CPF Inválido ❌";
          resultado.className = "invalido";
        }
      }
    }
  </script>

</body>
</html>
